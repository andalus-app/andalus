<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="theme-color" content="#25655e" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Andalus Kunskapscenter" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/icons/icon-180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/icons/icon-192.png" />
    <meta name="description" content="Andalus Kunskapscenter" />
    <title>Andalus Kunskapscenter</title>

    <!-- Font preload: eliminates FOUT on first paint -->
    <link rel="preload" href="%PUBLIC_URL%/assets/fonts/Inter-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="%PUBLIC_URL%/assets/fonts/Inter-Medium.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="%PUBLIC_URL%/assets/fonts/Inter-SemiBold.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="%PUBLIC_URL%/assets/fonts/DDIN-Bold.woff2" as="font" type="font/woff2" crossorigin="anonymous" />

    <style>
      @font-face { font-family:'D-DIN'; src:url('%PUBLIC_URL%/assets/fonts/DDIN-Bold.woff2') format('woff2'); font-weight:700; font-style:normal; font-display:block; }
  @font-face { font-family:'Inter'; src:url('%PUBLIC_URL%/assets/fonts/Inter-Regular.woff2') format('woff2'); font-weight:400; font-style:normal; font-display:swap; }
  @font-face { font-family:'Inter'; src:url('%PUBLIC_URL%/assets/fonts/Inter-Medium.woff2') format('woff2'); font-weight:500; font-style:normal; font-display:swap; }
  @font-face { font-family:'Inter'; src:url('%PUBLIC_URL%/assets/fonts/Inter-SemiBold.woff2') format('woff2'); font-weight:600; font-style:normal; font-display:swap; }
  @font-face { font-family:'Inter'; src:url('%PUBLIC_URL%/assets/fonts/Inter-Bold.woff2') format('woff2'); font-weight:700; font-style:normal; font-display:swap; }

      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        margin: 0; padding: 0; height: 100%;
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      .tabular { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <noscript>Du behover aktivera JavaScript.</noscript>
    <div id="root"></div>
  </body>
</html>
